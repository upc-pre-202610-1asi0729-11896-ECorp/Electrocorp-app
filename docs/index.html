<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title data-i18n="app.title">ElectroCorp</title>

    <link rel="stylesheet" href="css/styles.css">
</head>

<body>

    <!-- ===================== SIDEBAR ===================== -->
    <aside class="sidebar">
        <div class="logo">⚡ ElectroCorp</div>

        <nav>
            <div class="menu-item active-menu" data-section="centro" onclick="showSection('centro', this)">
                <span>⚡</span>
                <span data-i18n="menu.centro">Centro Energético</span>
            </div>

            <div class="menu-item" data-section="analitica" onclick="showSection('analitica', this)">
                <span>📊</span>
                <span data-i18n="menu.analitica">Analítica</span>
            </div>

            <div class="menu-item" data-section="dispositivos" onclick="showSection('dispositivos', this)">
                <span>🔌</span>
                <span data-i18n="menu.dispositivos">Dispositivos</span>
            </div>

            <div class="menu-item" data-section="historial" onclick="showSection('historial', this)">
                <span>📜</span>
                <span data-i18n="menu.historial">Historial</span>
            </div>

            <div class="menu-item" data-section="insights" onclick="showSection('insights', this)">
                <span>💡</span>
                <span data-i18n="menu.insights">IA Energética</span>
            </div>
        </nav>

        <div class="sidebar-footer">
            <div class="clock" id="clock">--:--:--</div>
        </div>
    </aside>

    <!-- ===================== MAIN ===================== -->
    <div class="main">

        <!-- TOPBAR -->
        <header class="topbar">
            <div class="topbar-left">
                <span class="badge" data-i18n="topbar.welcome">Bienvenido</span>
            </div>

            <div class="topbar-right">
                <div class="lang-switch">
                    <button class="lang-btn active" onclick="setLanguage('es')">ES</button>
                    <button class="lang-btn" onclick="setLanguage('en')">EN</button>
                    <button class="lang-btn" onclick="setLanguage('pt')">PT</button>
                </div>

                <button class="btn-ghost theme-toggle" onclick="toggleTheme()">
                    <span id="theme-icon">🌙</span>
                </button>
            </div>
        </header>

        <!-- SECCIÓN CENTRO -->
        <section id="centro" class="section active">
            <h1 data-i18n="centro.title">Centro Energético</h1>

            <div class="cards">
                <div class="card stat">
                    <h2 data-i18n="centro.monthly">Consumo mensual</h2>
                    <p id="stat-monthly">320 kWh</p>
                </div>

                <div class="card stat">
                    <h2 data-i18n="centro.cost">Gasto estimado</h2>
                    <p id="stat-cost">S/ 145</p>
                </div>

                <div class="card stat">
                    <h2 data-i18n="centro.saving">Ahorro</h2>
                    <p>18%</p>
                </div>

                <div class="card stat">
                    <h2 data-i18n="centro.devices">Dispositivos</h2>
                    <p id="stat-devices">3</p>
                </div>
            </div>

            <div class="card big chart-wrapper">
                <canvas id="chart"></canvas>
            </div>

            <div class="actions-row">
                <button class="btn-primary" onclick="openModal()">
                    Agregar consumo
                </button>

                <button class="btn-ghost" onclick="randomizeChart()">
                    Simular semana
                </button>
            </div>
        </section>

        <!-- (Las demás secciones siguen igual, ya estructuradas correctamente) -->

    </div>

    <!-- MODAL -->
    <div class="modal" id="modal">
        <div class="modal-content">
            <h3>Nuevo Consumo</h3>

            <input id="kwh-input" type="number" placeholder="kWh">

            <div class="modal-actions">
                <button class="btn-ghost" onclick="closeModal(false)">Cancelar</button>
                <button class="btn-primary" onclick="closeModal(true)">Guardar</button>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>
    <div class="loader" id="loader"></div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="js/app.js"></script>

</body>
</html>
