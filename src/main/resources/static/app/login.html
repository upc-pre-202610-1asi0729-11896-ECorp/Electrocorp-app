<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - ElectroCorp</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
<div class="main" style="display:flex;align-items:center;justify-content:center;min-height:100vh;">
    <div class="card" style="width:420px;max-width:92%;">
        <h1>Iniciar sesión</h1>

        <div class="cards" style="grid-template-columns:1fr;">
            <div class="card stat">
                <h2>Correo</h2>
                <input id="login-email" class="search-input" type="email" placeholder="jean@example.com">
            </div>

            <div class="card stat">
                <h2>Contraseña</h2>
                <input id="login-password" class="search-input" type="password" placeholder="******">
            </div>
        </div>

        <div class="actions-row">
            <button class="btn-primary" onclick="login()">Entrar</button>
            <button class="btn-ghost" onclick="goToRegister()">Crear cuenta</button>
        </div>
    </div>
</div>

<div class="toast" id="toast">Acción realizada</div>
<script src="js/auth.js"></script>
</body>
</html>
