<section class="metrics-grid">
  <article class="metric-card">
    <span>{{ 'energy.totalWatts' | translate }}</span>
    <strong>{{ totalWatts }}W</strong>
  </article>

  <article class="metric-card">
    <span>{{ 'energy.averageWatts' | translate }}</span>
    <strong>{{ averageWatts }}W</strong>
  </article>

  <article class="metric-card">
    <span>{{ 'energy.highestReading' | translate }}</span>
    <strong>{{ highestReading }}W</strong>
  </article>
</section>
